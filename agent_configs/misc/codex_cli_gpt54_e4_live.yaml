extends: base_v2.yaml

profile: { name: codex-cli-gpt5.4-e4-live }

providers:
  default_model: openai/gpt-5.4
  models:
    - id: openai/gpt-5.4
      adapter: openai
      params: { temperature: 0.2, top_p: 0.9 }

provider_tools:
  use_native: false
  suppress_prompts: false
  api_variant: responses

workspace:
  shell_scope:
    reject_parent_traversal: true

workloop_guards:
  implementation_write_receipts:
    enabled: true
    max_read_only_calls_before_write: 4

features:
  plan: false
  todos:
    enabled: false

prompts:
  packs:
    base:
      system: ../../../other_harness_refs/codex/codex-rs/core/gpt_5_1_prompt.md
      plan: ../../../other_harness_refs/codex/codex-rs/core/gpt_5_1_prompt.md
      builder: ../../../other_harness_refs/codex/codex-rs/core/gpt_5_1_prompt.md
      compact: ../../../other_harness_refs/codex/codex-rs/core/gpt_5_1_prompt.md
      tools_catalog_full: ../../../other_harness_refs/codex/codex-rs/core/gpt_5_1_prompt.md
      tools_catalog_short: ../../../other_harness_refs/codex/codex-rs/core/gpt_5_1_prompt.md
    breadboard_workspace:
      system: codex_workspace_scope_contract.md
  tool_prompt_synthesis:
    enabled: false
  injection:
    system_order:
      - "@pack(base).system"
      - "@pack(breadboard_workspace).system"
    per_turn_order: []

tools:
  registry:
    paths:
      - implementations/tools/defs
    include:
      - shell_command
      - apply_patch
      - mark_task_complete
  aliases: {}

concurrency:
  at_most_one_of: [shell_command]
