version: 2
profile:
  name: codex-subagent-readonly

# Lightweight helper profile used only to document the worker role referenced by the public
# Codex dossier's `multi_agent` section.

workspace:
  root: ./agent_ws

providers:
  default_model: openai/gpt-5.1-codex-mini
  models:
  - id: openai/gpt-5.1-codex-mini
    adapter: openai

prompts:
  packs:
    base:
      system: ../../config/e4_targets/codex/0.107.0/prompts/gpt_5_1_codex_prompt.md
      builder: ../../config/e4_targets/codex/0.107.0/prompts/gpt_5_1_codex_prompt.md

tools:
  registry:
    paths:
    - ../../implementations/tools/defs
    include:
    - shell_command
    - apply_patch

features:
  plan: false
  todos:
    enabled: false
