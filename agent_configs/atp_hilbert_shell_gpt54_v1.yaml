extends: base_v2.yaml

profile:
  name: atp-hilbert-shell-gpt54-v1

providers:
  default_model: openrouter/openai/gpt-5.4
  models:
    - id: openrouter/openai/gpt-5.4
      adapter: openai
      params:
        temperature: 0.2
        parallel_tools: false
      routing:
        disable_stream_on_probe_failure: true
        disable_native_tools_on_probe_failure: true
        fallback_models: []

provider_tools:
  use_native: true
  suppress_prompts: false
  api_variant: responses

prompts:
  tool_prompt_mode: per_turn_append
  tool_prompt_synthesis:
    enabled: false

tools:
  mark_task_complete: false
  registry:
    paths:
      - implementations/tools/defs
    include:
      - shell_command
  aliases: {}

modes:
  - name: plan
    prompt: "@pack(base).plan"
    tools_enabled: [shell_command]
    tools_disabled: []
  - name: build
    prompt: "@pack(base).builder"
    tools_enabled: [shell_command]
    tools_disabled: []
  - name: compact
    prompt: "@pack(base).compact"
    tools_enabled: []

loop:
  sequence:
    - mode: build
  plan_turn_limit: 0
  turn_strategy:
    relay: tool_role
    flow: assistant_continuation
    allow_multiple_per_turn: false

features:
  plan: false
  todos:
    enabled: false

completion:
  confidence_threshold: 0.6
  natural_finish:
    idle_turn_limit: 1
    no_tool_turns_threshold: 1
  primary: hybrid
  provider_signals: true
  text_sentinels:
    - TASK COMPLETE
    - ALL TESTS PASSED
    - IMPLEMENTATION COMPLETE
