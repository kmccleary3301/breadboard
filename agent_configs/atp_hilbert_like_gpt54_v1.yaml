# Hilbert-like ATP comparator arm
# Standalone by design: no `extends`, no hidden prompt overlays, and no gitignored assets.
# This is not a parity claim against Hilbert internals. It is a behavioral comparator arm that
# uses BreadBoard primitives to mimic the proof-edit -> verify -> repair rhythm that Hilbert
# exposes on small Lean benchmark slices.
#
# Design goals:
# - narrower than the generic BB ATP shell-first baseline
# - interpretable enough to audit quickly
# - strong theorem-locking / verifier-driven repair posture

version: 2
profile:
  name: atp-hilbert-like-gpt54-v1

workspace:
  root: ./agent_ws_atp_hilbert_like
  sandbox:
    driver: process
  mirror:
    enabled: false
    path: ./agent_ws_atp_hilbert_like
    mode: development

providers:
  default_model: openrouter/openai/gpt-5.4
  routing:
    disable_native_tools_on_probe_failure: true
    disable_stream_on_probe_failure: true
  models:
  - id: openrouter/openai/gpt-5.4
    adapter: openai
    params:
      temperature: 0.1
      parallel_tools: false
    routing:
      fallback_models: []

provider_tools:
  use_native: true
  suppress_prompts: false
  api_variant: responses

prompts:
  packs:
    base:
      system: ../config/e4_targets/atp_hilbert_like/2026-03-09/prompts/system.md
      plan: ../config/e4_targets/atp_hilbert_like/2026-03-09/prompts/system.md
      builder: ../config/e4_targets/atp_hilbert_like/2026-03-09/prompts/system.md
      compact: ../config/e4_targets/atp_hilbert_like/2026-03-09/prompts/system.md
  tool_prompt_mode: system_compiled_and_persistent_per_turn
  tool_prompt_synthesis:
    enabled: false
  injection:
    system_order:
    - '@pack(base).system'
    per_turn_order: []

tools:
  mark_task_complete: false
  registry:
    paths:
    - ../implementations/tools/defs
    include:
    - shell_command
  aliases: {}

modes:
- name: plan
  prompt: '@pack(base).plan'
  tools_enabled:
  - shell_command
  tools_disabled: []
- name: build
  prompt: '@pack(base).builder'
  tools_enabled:
  - shell_command
  tools_disabled: []
- name: compact
  prompt: '@pack(base).compact'
  tools_enabled: []

loop:
  sequence:
  - mode: build
  plan_turn_limit: 0
  turn_strategy:
    relay: tool_role
    flow: assistant_continuation
    allow_multiple_per_turn: false

features:
  plan: false
  todos:
    enabled: false

completion:
  confidence_threshold: 0.7
  natural_finish:
    idle_turn_limit: 1
    no_tool_turns_threshold: 1
  primary: hybrid
  provider_signals: true
  text_sentinels:
  - TASK COMPLETE
  - PROOF COMPLETE
