schema_version: bb.harness_definition.v1
version: 1
workspace: {root: .}
providers: {default_model: anthropic/claude-sonnet, models: [{id: anthropic/claude-sonnet, adapter: anthropic, params: {max_output_tokens: 8192, tool_use: true}}]}
provider_tools: {anthropic: {max_output_tokens: 8192, stream: true}}
tools: {registry: {paths: [implementations/tools/defs]}, mark_task_complete: true}
modes: [{name: plan, tools_enabled: [read_file, list_dir, run_shell]}, {name: build, tools_enabled: [read_file, list_dir, run_shell, edit_file]}]
loop: {sequence: [{mode: plan}, {mode: build}]}
