name: P30 Three-Lane Ubuntu x64

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/p30-three-lane-ubuntu-x64.yml"
      - "agentic_coder_prototype/api/cli_bridge/**"
      - "agent_configs/misc/opencode_smoke_mock.yaml"
      - "scripts/p30_three_lane/**"

permissions:
  contents: read

jobs:
  ubuntu-x64-tui:
    name: Ubuntu x64 prompt-response PTY
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      OMP_REF: p30/bb89n16-session-port-20260718
      PROOF_IMAGE: breadboard-omp-p30:ubuntu-x64
    steps:
      - name: Check out BreadBoard backend
        uses: actions/checkout@v4

      - name: Check out OMP TUI branch
        uses: actions/checkout@v4
        with:
          repository: kmccleary3301/oh-my-pi
          ref: ${{ env.OMP_REF }}
          path: oh-my-pi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install runtime and PTY dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install --yes expect

      - name: Build Ubuntu x64 OMP image
        run: docker build --platform linux/amd64 --tag "$PROOF_IMAGE" oh-my-pi

      - name: Prepare proof workspace
        run: |
          mkdir -p artifacts proof-agent proof-workspace
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          settings = {
              "breadboard": {
                  "engineMode": "local-external",
                  "baseUrl": "http://127.0.0.1:9099",
                  "sessionConfigPath": str(
                      Path(os.environ["GITHUB_WORKSPACE"])
                      / "agent_configs/misc/opencode_smoke_mock.yaml"
                  ),
                  "requestTimeoutMs": 30000,
              }
          }
          Path("proof-agent/settings.json").write_text(json.dumps(settings))
          PY

      - name: Start deterministic BreadBoard engine
        env:
          BREADBOARD_CLI_HOST: 127.0.0.1
          BREADBOARD_CLI_PORT: "9099"
          BREADBOARD_CLI_LOG_LEVEL: warning
          MOCK_API_KEY: gha-local-smoke
        run: |
          nohup python -m agentic_coder_prototype.api.cli_bridge.server > artifacts/engine.log 2>&1 &
          echo $! > artifacts/engine.pid
          for attempt in $(seq 1 300); do
            if curl -fsS http://127.0.0.1:9099/health > artifacts/health.json 2>/dev/null; then
              exit 0
            fi
            sleep 0.2
          done
          cat artifacts/engine.log
          exit 1

      - name: Run Ubuntu x64 TUI prompt-response proof
        run: |
          scripts/p30_three_lane/ubuntu_x64_tui.exp \
            "$PROOF_IMAGE" \
            "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/proof-agent" \
            "$GITHUB_WORKSPACE/proof-workspace" \
            "$GITHUB_WORKSPACE/artifacts/ubuntu-x64-tui.raw"

      - name: Verify proof markers
        run: |
          python - <<'PY'
          from pathlib import Path

          raw = Path("artifacts/ubuntu-x64-tui.raw").read_text(errors="replace")
          required = (
              "THREE_LANE_SMOKE_UBUNTU_X64",
              "Hi! All systems nominal.",
              "TASK COMPLETE",
          )
          missing = [marker for marker in required if marker not in raw]
          if missing:
              raise SystemExit(f"missing proof markers: {missing}")
          PY

      - name: Upload Ubuntu x64 proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p30-three-lane-ubuntu-x64-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/engine.log
            artifacts/health.json
            artifacts/ubuntu-x64-tui.raw
          if-no-files-found: warn
