name: E4 Battery

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/e4_parity/**"
      - "tests/e4_parity/**"
      - "contracts/kernel/**"
      - "config/e4_lanes/**"

jobs:
  e4-battery:
    name: e4-battery
    runs-on: ubuntu-latest
    env:
      BB_WORKSPACE_ROOT: ${{ github.workspace }}/..
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bootstrap E4 battery environment
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Provision immutable E4 inputs
        run: python scripts/e4_parity/provision_immutable_inputs.py --repo-root "$GITHUB_WORKSPACE" --workspace-root "$GITHUB_WORKSPACE/.."

      - name: Verify exact 1000-point fixed-point regeneration
        run: python scripts/e4_parity/regen.py fixed-point --expected-points 1000 --expected-target-claims 10 --expected-non-target-claims 8 --json artifacts/conformance/e4_regen_fixed_point.json

      - name: Run full literal E4 parity battery
        run: pytest -q tests/e4_parity

  fixed-point-clean-checkout:
    name: Fixed-point clean checkout (${{ matrix.pass }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pass: [first, second]
    env:
      BB_WORKSPACE_ROOT: ${{ github.workspace }}/..
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Bootstrap E4 battery environment
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Provision immutable E4 inputs
        run: python scripts/e4_parity/provision_immutable_inputs.py --repo-root "$GITHUB_WORKSPACE" --workspace-root "$GITHUB_WORKSPACE/.."
      - name: Generate fixed-point report
        run: python scripts/e4_parity/regen.py fixed-point --expected-points 1000 --expected-target-claims 10 --expected-non-target-claims 8 --json artifacts/conformance/e4_regen_fixed_point_${{ matrix.pass }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: e4-fixed-point-${{ matrix.pass }}
          path: artifacts/conformance/e4_regen_fixed_point_${{ matrix.pass }}.json
          if-no-files-found: error

  fixed-point-clean-checkout-compare:
    name: Compare independent fixed-point checkouts
    needs: fixed-point-clean-checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: e4-fixed-point-first
          path: artifacts/first
      - uses: actions/download-artifact@v4
        with:
          name: e4-fixed-point-second
          path: artifacts/second
      - name: Compare clean-checkout reports byte-for-byte
        run: cmp artifacts/first/e4_regen_fixed_point_first.json artifacts/second/e4_regen_fixed_point_second.json
