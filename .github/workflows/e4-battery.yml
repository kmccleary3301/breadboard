name: E4 Battery

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/e4_parity/**"
      - "tests/e4_parity/**"
      - "contracts/kernel/**"
      - "config/e4_lanes/**"

jobs:
  e4-battery:
    name: e4-battery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bootstrap E4 battery environment
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run hermetic E4 parity battery
        env:
          BB_WORKSPACE_ROOT: ${{ github.workspace }}
        # Only cases requiring evidence unavailable in a clean checkout stay excluded.
        run: >-
          pytest -q tests/e4_parity
          --ignore=tests/e4_parity/test_build_oh_my_pi_l5_memory_compaction.py
          --ignore=tests/e4_parity/test_build_oh_my_pi_l6_tui_projection.py
          --ignore=tests/e4_parity/test_build_oh_my_pi_p6_6_task_job_subagent.py
          --ignore=tests/e4_parity/test_build_pi_p5_extension_session_residual.py
          --ignore=tests/e4_parity/test_build_primitive_projection.py
          --ignore=tests/e4_parity/test_e4_report_hash_freshness.py
          --ignore=tests/e4_parity/test_e4_score_subledger.py
          --ignore=tests/e4_parity/test_generate_lane_inventory.py
          --ignore=tests/e4_parity/test_lane_def_metadata_non_normative.py
          --ignore=tests/e4_parity/test_oh_my_pi_p6_profile_capture.py
          --ignore=tests/e4_parity/test_p3_remaining_helper_runtime_inventory.py
          --deselect=tests/e4_parity/test_binding_topology_reports.py::test_phase15_archive_manifest_is_content_addressed
          --deselect=tests/e4_parity/test_check_er_progress.py::test_live_bb_er_progress_passes_checker
          --deselect=tests/e4_parity/test_lane_inventory_consistency.py::test_inventory_points_match_score_subledger_accounting
          --deselect=tests/e4_parity/test_north_star_c4_packets.py::test_north_star_lanes_run_through_lane_def_and_support_claim_generators
          --deselect=tests/e4_parity/test_north_star_c4_packets.py::test_north_star_reverify_commands_and_checked_in_artifacts_are_canonical_and_pass_c4
          --deselect=tests/e4_parity/test_oh_my_pi_compiler_capture.py::test_scratch_capture_reproduces_governed_accepted_role_bytes_without_accepted_writes
          --deselect=tests/e4_parity/test_oh_my_pi_compiler_capture.py::test_p31_lane_names_and_byte_locks_all_three_projection_outputs
          --deselect=tests/e4_parity/test_oh_my_pi_compiler_capture.py::test_pure_projections_are_repeatable_and_sensitive_to_declared_source_context
          --deselect=tests/e4_parity/test_seed_ledger_merge.py::test_seed_write_preserves_existing_lane_upserted_l2_rows_byte_for_byte
          --deselect=tests/e4_parity/test_wsj_compliance_contracts.py::test_breadboard_self_capture_replays_runtime_records_and_binds_transcript_digest
          --deselect=tests/e4_parity/test_wsj_compliance_contracts.py::test_wsj_evidence_manifests_and_catalog_entries_have_fresh_hashes

      # Fixed-point regeneration runs in the evidence workspace; CI checks the DAG shape.
      - name: Verify regeneration DAG
        run: python scripts/e4_parity/regen.py explain --json artifacts/conformance/e4_regen_plan.json
