name: ATP Ops Bundle (nightly)

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  atp_ops_bundle:
    name: ATP smoke+bench+load+recovery (self-hosted)
    if: ${{ vars.ATP_FIRECRACKER_SMOKE == '1' }}
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run ATP smoke + bench + load bundle
        env:
          FIRECRACKER_SNAPSHOT: ${{ vars.FIRECRACKER_SNAPSHOT }}
          FIRECRACKER_SNAPSHOT_MEM: ${{ vars.FIRECRACKER_SNAPSHOT_MEM }}
          FIRECRACKER_SNAPSHOT_VSOCK: ${{ vars.FIRECRACKER_SNAPSHOT_VSOCK }}
          FIRECRACKER_ROOTFS: ${{ vars.FIRECRACKER_ROOTFS }}
          FIRECRACKER_SNAPSHOT_DIRS: ${{ vars.FIRECRACKER_SNAPSHOT_DIRS }}
          FIRECRACKER_BIN: ${{ vars.FIRECRACKER_BIN }}
          FIRECRACKER_VSOCK_PORT: ${{ vars.FIRECRACKER_VSOCK_PORT }}
          FIRECRACKER_REPL_VSOCK_PORT: ${{ vars.FIRECRACKER_REPL_VSOCK_PORT }}
          ATP_SNAPSHOT_POOL_PROBE: ${{ vars.ATP_SNAPSHOT_POOL_PROBE || '1' }}
          ATP_SNAPSHOT_POOL_MIN_HEALTHY: ${{ vars.ATP_SNAPSHOT_POOL_MIN_HEALTHY || '1' }}
          ATP_REPL_LOAD_CONCURRENCY: ${{ vars.ATP_REPL_LOAD_CONCURRENCY || '4' }}
          ATP_REPL_LOAD_ITERS: ${{ vars.ATP_REPL_LOAD_ITERS || '40' }}
          ATP_REPL_BENCH_VALIDATE: "1"
          ATP_REPL_LOAD_VALIDATE: "1"
          ATP_REPL_BUDGET_P95_MS: ${{ vars.ATP_REPL_BUDGET_P95_MS || '200' }}
          BUDGET_P95_MS: ${{ vars.ATP_REPL_BUDGET_P95_MS || '200' }}
        run: bash scripts/atp_firecracker_ci.sh

      - name: Run ATP state-ref regression recovery
        env:
          FIRECRACKER_SNAPSHOT_DIRS: ${{ vars.FIRECRACKER_SNAPSHOT_DIRS }}
          FIRECRACKER_BIN: ${{ vars.FIRECRACKER_BIN }}
          FIRECRACKER_VSOCK_PORT: ${{ vars.FIRECRACKER_VSOCK_PORT }}
          FIRECRACKER_REPL_VSOCK_PORT: ${{ vars.FIRECRACKER_REPL_VSOCK_PORT }}
          ATP_STATE_REF_BASELINE_PATH: ${{ vars.ATP_STATE_REF_BASELINE_PATH }}
          ATP_STATE_REF_MAX_REGRESSION_PCT: ${{ vars.ATP_STATE_REF_MAX_REGRESSION_PCT || '10' }}
          ATP_STATE_REF_RECOVERY_RUNS: ${{ vars.ATP_STATE_REF_RECOVERY_RUNS || '3' }}
          ATP_STATE_REF_RECOVERY_REQUIRED_CONSECUTIVE: ${{ vars.ATP_STATE_REF_RECOVERY_REQUIRED_CONSECUTIVE || '2' }}
          ATP_STATE_REF_CONCURRENCY: ${{ vars.ATP_STATE_REF_CONCURRENCY || '4' }}
          ATP_STATE_REF_MEASURE_ITERS: ${{ vars.ATP_STATE_REF_MEASURE_ITERS || '10' }}
          ATP_STATE_REF_MEASURE_BURN_IN_ITERS: ${{ vars.ATP_STATE_REF_MEASURE_BURN_IN_ITERS || '2' }}
          ATP_STATE_REF_REPL_TIMEOUT: ${{ vars.ATP_STATE_REF_REPL_TIMEOUT || '120' }}
        run: |
          baseline="${ATP_STATE_REF_BASELINE_PATH:-}"
          if [ -z "$baseline" ] && [ -f artifacts/atp_state_ref_fastpath_baseline.json ]; then
            baseline="artifacts/atp_state_ref_fastpath_baseline.json"
          fi
          if [ -z "$baseline" ]; then
            echo "No baseline configured; skipping state-ref recovery."
            exit 0
          fi
          python scripts/atp_state_ref_regression_recovery.py \
            --baseline "$baseline" \
            --runs "$ATP_STATE_REF_RECOVERY_RUNS" \
            --required-consecutive-pass "$ATP_STATE_REF_RECOVERY_REQUIRED_CONSECUTIVE" \
            --max-regression-pct "$ATP_STATE_REF_MAX_REGRESSION_PCT" \
            --run-tag nightly_ops \
            --concurrency "$ATP_STATE_REF_CONCURRENCY" \
            --iters "$ATP_STATE_REF_MEASURE_ITERS" \
            --burn-in-iters "$ATP_STATE_REF_MEASURE_BURN_IN_ITERS" \
            --repl-timeout "$ATP_STATE_REF_REPL_TIMEOUT" \
            --skip-preflight \
            --report-out artifacts/atp_state_ref_recovery_report.ops_nightly.json

      - name: Build pool stability summary
        if: always()
        run: |
          python scripts/atp_snapshot_pool_stability.py \
            --glob "artifacts/atp_firecracker_repl_load*.json" \
            --require-concurrency "${ATP_REPL_LOAD_CONCURRENCY:-4}" \
            --min-runs "${ATP_POOL_STABILITY_MIN_RUNS:-1}" \
            --max-p95-ms "${ATP_POOL_STABILITY_MAX_P95_MS:-200}" \
            --out artifacts/atp_snapshot_pool_stability_summary.ops_nightly.json

      - name: Build ATP ops digest
        if: always()
        run: |
          python scripts/atp_ops_digest.py \
            --artifact-dir artifacts \
            --threshold-policy config/atp_threshold_policy.json \
            --out artifacts/atp_ops_digest.ops_nightly.json

      - name: Build seven-day stability report
        if: always()
        run: |
          python scripts/atp_seven_day_stability_report.py \
            --artifact-dir artifacts \
            --threshold-policy config/atp_threshold_policy.json \
            --out artifacts/atp_seven_day_stability_report.ops_nightly.json

      - name: Escalation gate (incident on repeated failures)
        if: always()
        run: |
          state="$(python - <<'PY'\nimport json\nfrom pathlib import Path\np=Path('artifacts/atp_ops_digest.ops_nightly.json')\nif not p.exists():\n    print('warning')\nelse:\n    d=json.loads(p.read_text(encoding='utf-8'))\n    print(d.get('decision_state','warning'))\nPY\n)"
          echo "ops_decision_state=$state"
          if [ "$state" = "incident" ]; then
            echo "Repeated ATP failures crossed incident threshold." >&2
            exit 1
          fi

      - name: Upload ATP ops bundle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atp-ops-bundle-nightly
          path: |
            artifacts/atp_firecracker_repl_bench.json
            artifacts/atp_firecracker_repl_load*.json
            artifacts/atp_state_ref_recovery_report*.json
            artifacts/atp_snapshot_pool_stability_summary*.json
            artifacts/atp_ops_digest*.json
            artifacts/atp_seven_day_stability_report*.json
            artifacts/atp_benchmark_drift_report*.json
          if-no-files-found: ignore
