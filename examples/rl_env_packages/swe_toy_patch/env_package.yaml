    - package_id
    - image_digest
verifier:
  verifier_id: swe_toy_patch_pytest
  kind: pytest
  code_hash: sha256:swe-toy-patch-verifier
  input_contract:
    requires:
      - workspace_ref
      - patch_ref
  output_contract:
    reward: float
    passed: bool
  isolated_from_agent: true
  rerun_policy:
    required_for_promotion: true
reward:
  reward_id: swe_toy_patch_reward
